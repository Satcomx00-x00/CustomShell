version: '3.8'

services:
  custom-shell:
    build: .
    container_name: custom-starship-zsh
    volumes:
      - .:/workspace
      - ~/.ssh:/home/developer/.ssh:ro
      - ~/.gitconfig:/home/developer/.gitconfig:ro
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
    command: zsh