# ~/.config/starship.toml
# Theme: Dracula Dark — Rounded, Layered, Faded

add_newline = true
command_timeout = 1500
palette = "dracula"

# -------- Dracula Palette --------
[palettes.dracula]
bg      = "#1E1F29"
bg2     = "#282A36"
bg3     = "#44475A"
fg      = "#F8F8F2"
muted   = "#6272A4"
cyan    = "#8BE9FD"
green   = "#50FA7B"
orange  = "#FFB86C"
pink    = "#FF79C6"
purple  = "#BD93F9"
red     = "#FF5555"
yellow  = "#F1FA8C"
blue    = "#6272A4"

# -------- Layout --------
format = """
$directory\
$git_branch$git_status\
$kubernetes\
$docker_context\
$terraform\
$helm\
$line_break\
$python$bun$go$rust$sudo$cmd_duration$status\
$character
"""

right_format = """$time"""

# -------- Character --------
[character]
success_symbol = "[](fg:green)[$symbol](fg:bg bg:green)[](fg:green) "
error_symbol   = "[](fg:red)[$symbol](fg:bg bg:red)[](fg:red) "
vicmd_symbol   = "[](fg:purple)[](fg:bg bg:purple)[](fg:purple) "
symbol = "❯"
format = "$symbol "

# -------- Directory --------
[directory]
style = "fg:fg bg:bg3 bold"
format = "[](fg:bg3)[$path]($style)[](fg:bg3) "
truncation_length = 3
truncate_to_repo = true
read_only = " "

# -------- Git --------
[git_branch]
symbol = " "
style = "fg:bg bg:pink"
format = "[](fg:pink)[$symbol$branch]($style)[](fg:pink)"

[git_status]
style = "fg:bg bg:pink dimmed"
format = "[$all_status$ahead_behind]($style) "
conflicted = " "
ahead = " ⇡${count}"
behind = " ⇣${count}"
modified = " ${count}"
staged = " ${count}"
untracked = " ${count}"

# -------- Kubernetes --------
[kubernetes]
symbol = "⎈ "
style = "fg:bg bg:cyan bold"
format = "[](fg:cyan)[$symbol$context(::$namespace)]($style)[](fg:cyan) "
disabled = false

# -------- Docker --------
[docker_context]
symbol = " "
style = "fg:bg bg:blue bold"
format = "[](fg:blue)[$symbol$context]($style)[](fg:blue) "
only_with_files = false

# -------- Terraform --------
[terraform]
symbol = " "
style = "fg:bg bg:purple bold"
format = "[](fg:purple)[$symbol$workspace]($style)[](fg:purple) "

# -------- Helm --------
[helm]
symbol = "󱃾 "
style = "fg:bg bg:yellow bold"
format = "[](fg:yellow)[$symbol$version]($style)[](fg:yellow) "

# -------- Python --------
[python]
symbol = " "
style = "fg:bg bg:green bold"
format = "[](fg:green)[$symbol$version( $virtualenv)]($style)[](fg:green) "
python_binary = ["python3", "python"]

# -------- Bun --------
[bun]
symbol = " "
style = "fg:bg bg:orange bold"
format = "[](fg:orange)[$symbol$version]($style)[](fg:orange) "
detect_files = ["bun.lockb", "package.json"]

# -------- Go --------
[golang]
symbol = " "
style = "fg:bg bg:cyan bold"
format = "[](fg:cyan)[$symbol$version]($style)[](fg:cyan) "

# -------- Rust --------
[rust]
symbol = " "
style = "fg:bg bg:red bold"
format = "[](fg:red)[$symbol$version]($style)[](fg:red) "

# -------- Sudo --------
[sudo]
symbol = " "
style = "fg:bg bg:red bold"
format = "[](fg:red)[$symbol as root]($style)[](fg:red) "

# -------- Time --------
[time]
disabled = false
time_format = "%H:%M"
style = "fg:muted bg:bg2"
format = "[](fg:bg2)[$time]($style)[](fg:bg2) "

# -------- Command Duration --------
[cmd_duration]
min_time = 700
style = "fg:muted bg:bg3 italic"
format = "[](fg:bg3)[$duration]($style)[](fg:bg3) "

# -------- Status --------
[status]
style = "fg:bg bg:red"
symbol = "✖ "
format = "[](fg:red)[$symbol$status]($style)[](fg:red) "
disabled = false
pipestatus = true
