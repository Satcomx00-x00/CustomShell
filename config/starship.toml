# ~/.config/starship.toml
# Theme: Dracula (dark), rounded segments, subtle fades

add_newline = true
command_timeout = 1500
palette = "dracula"

# -------- Palette --------
[palettes.dracula]
bg         = "#282A36"
bg2        = "#44475A"
fg         = "#F8F8F2"
muted      = "#6272A4"
cyan       = "#8BE9FD"
green      = "#50FA7B"
orange     = "#FFB86C"
pink       = "#FF79C6"
purple     = "#BD93F9"
red        = "#FF5555"
yellow     = "#F1FA8C"

# -------- Layout --------
# Line 1: dir вҶ’ git вҶ’ k8s вҶ’ docker вҶ’ terraform вҶ’ helm
format = """
$directory\
$git_branch$git_status\
$kubernetes\
$docker_context\
$terraform\
$helm\
$line_break\
$python$bun$go$rust$sudo$cmd_duration$status$time\
$character
"""

# Optional content on the right (kept minimal to stay clean)
right_format = """$username"""

# -------- Prompt Character --------
[character]
success_symbol = "[оӮ¶](fg:purple)[$symbol](fg:bg bg:purple)[оӮҙ](fg:purple)"
error_symbol   = "[оӮ¶](fg:red)[$symbol](fg:bg bg:red)[оӮҙ](fg:red)"
vicmd_symbol   = "[оӮ¶](fg:cyan)[оҳ«](fg:bg bg:cyan)[оӮҙ](fg:cyan)"
format = "$symbol "
# Use a soft arrow
symbol = "вқҜ"

[continuation_prompt]
symbol = "вӢҜ "
style = "fg:muted"

# -------- Directory (big, first) --------
[directory]
style = "fg:fg bg:purple dimmed"
format = "[оӮ¶](fg:purple)[$path]($style)[оӮҙ](fg:purple) "
truncation_length = 3
truncate_to_repo = true
repo_root_style = "fg:bg bg:purple"
read_only = " пҖЈ"
fish_style_pwd_dir_length = 1

# -------- Git --------
[git_branch]
symbol = "оӮ  "
style = "fg:bg bg:pink dimmed"
format = "[оӮ¶](fg:pink)[$symbol$branch]($style)[оӮҙ](fg:pink)"

[git_status]
style = "fg:bg bg:pink"
format = "[$all_status$ahead_behind]($style) "
conflicted = " о®«"
ahead = " вҮЎ${count}"
behind = " вҮЈ${count}"
deleted = " пҖҚ${count}"
modified = " п‘ҷ${count}"
staged = " пҒ§${count}"
stashed = " п’Ү${count}"
renamed = " п•”${count}"
untracked = " п„Ё${count}"

# -------- Kubernetes (highlighted) --------
[kubernetes]
symbol = "вҺҲ "
style = "fg:bg bg:cyan dimmed"
format = "[оӮ¶](fg:cyan)[$symbol$context(::$namespace)]($style)[оӮҙ](fg:cyan) "
# Show only when relevant
disabled = false
detect_extensions = ["yaml", "yml", "json"]
detect_files = ["kubernetes.yaml","k8s.yaml",".kube/config"]
contexts = [
  { context_pattern = ".*", style = "fg:bg bg:cyan dimmed", symbol = "вҺҲ " }
]

# -------- Docker --------
[docker_context]
symbol = "пҢҲ "
style = "fg:bg bg:blue dimmed"
format = "[оӮ¶](fg:blue)[$symbol$context]($style)[оӮҙ](fg:blue) "
only_with_files = false

# -------- Terraform --------
[terraform]
symbol = "оҡҡ "
style = "fg:bg bg:purple dimmed"
format = "[оӮ¶](fg:purple)[$symbol$workspace]($style)[оӮҙ](fg:purple) "
detect_extensions = ["tf", "tfvars"]
detect_files = ["terraform.tf", ".terraform", "terragrunt.hcl"]

# -------- Helm --------
[helm]
symbol = "уұғҫ "
style = "fg:bg bg:yellow dimmed"
format = "[оӮ¶](fg:yellow)[$symbol$version]($style)[оӮҙ](fg:yellow) "
detect_files = ["Chart.yaml", "values.yaml"]

# -------- Python (highlighted) --------
[python]
symbol = "оҳҶ "
style = "fg:bg bg:green"
python_binary = ["python", "python3", "py"]
format = "[оӮ¶](fg:green)[$symbol$virtualenv]($style)[оӮҙ](fg:green) "
# Show version subtly after the segment
version_format = " v${raw}"
pyenv_version_name = true
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", "Pipfile", ".python-version", "poetry.lock"]

# -------- Bun (highlighted) --------
[bun]
symbol = "оҡҜ "
style = "fg:bg bg:orange"
format = "[оӮ¶](fg:orange)[$symbol$version]($style)[оӮҙ](fg:orange) "
detect_files = ["bun.lockb", "bunfig.toml", "package.json"]

# -------- Go --------
[golang]
symbol = "оҳ§ "
style = "fg:bg bg:cyan dimmed"
format = "[оӮ¶](fg:cyan)[$symbol$version]($style)[оӮҙ](fg:cyan) "
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum"]

# -------- Rust --------
[rust]
symbol = "оһЁ "
style = "fg:bg bg:red dimmed"
format = "[оӮ¶](fg:red)[$symbol$version]($style)[оӮҙ](fg:red) "
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]

# -------- Sudo (privileged indicator) --------
[sudo]
symbol = "пҖ“ "
style = "fg:bg bg:red"
format = "[оӮ¶](fg:red)[$symbol as root]($style)[оӮҙ](fg:red) "
disabled = false

# -------- Time & Status --------
[time]
disabled = false
time_format = "%H:%M"
style = "fg:muted"
format = " [$time]($style)"

[status]
style = "fg:bg bg:red"
symbol = "вң– "
format = "[оӮ¶](fg:red)[$symbol$status]($style)[оӮҙ](fg:red) "
disabled = false
map_symbol = true
pipestatus = true

[cmd_duration]
min_time = 750
format = " пү’ [$duration]($style)"
style = "fg:muted"

# -------- Username (right side, muted) --------
[username]
format = " [$user]($style)"
style_root = "fg:yellow"
style_user = "fg:muted"
show_always = false

# -------- Misc cleanups --------
[battery]
disabled = true

[package]
disabled = true

[nodejs]
disabled = true  # You said Bun is primary

[aws]
disabled = true

[gcloud]
disabled = true
